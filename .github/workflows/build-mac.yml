name: Build macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        run: npm run build:mac

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-companion-macos
          path: |
            release/*.dmg
            release/**/*.dmg
